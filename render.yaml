services:
  - type: web
    name: cherry-bank-backend
    runtime: node
    plan: free
    buildCommand: "npm install"
    startCommand: "node server/index.js"
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false